name: Build Android APK (CI Only)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Node setup
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install dependencies
      - name: Install npm dependencies
        run: npm install

      # Install Capacitor + Android tools (CI only)
      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      # Initialize Capacitor project in CI
      - name: Init Capacitor project
        run: |
          npx cap init "Crypt Raider Reborn" "com.yourname.cryptraider" --web-dir=www

      # Add Android platform in CI (no local terminal needed)
      - name: Add Android platform
        run: |
          npm install @capacitor/android
          npx cap add android || echo "Android already exists"

      # Sync web assets into Android
      - name: Sync Capacitor
        run: npx cap sync android

      # Install Java (required for Gradle)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Build APK using Gradle
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: crypt-raider-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk