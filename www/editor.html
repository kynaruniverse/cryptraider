<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Level Editor</title>
  <link rel="stylesheet" href="editor.css">
</head>
<body>

<h2>Crypt Raider Level Editor</h2>

<div id="toolbar">
  <button data-tile="1">Wall</button>
  <button data-tile="0">Floor</button>
  <button data-tile="3">Box</button>
  <button data-tile="4">Exit</button>
  <button data-tile="6">Switch</button>
  <button data-tile="7">Door</button>
  <button id="playerBtn">Player Start</button>
  <button id="exportBtn">Export JSON</button>
</div>

<canvas id="editorCanvas"></canvas>

<script src="editor.js"></script>

</body>
</html>
